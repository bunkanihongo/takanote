# ===== Site Configuration =====
theme: jekyll-theme-chirpy

lang: ja

timezone: Asia/Tokyo

title: たかのーと
tagline: 日本語を学ぶためのノート
description: >-
  日本語学習の記録とまとめ。文法、単語、読解など、少しずつ毎日続けるためのノートです。

url: "https://bunkanihongo.github.io"
baseurl: "/takanote"

github:
  username: bunkanihongo

twitter:
  username:

social:
  name: bunkanihongo
  email: bunkanihongo@gmail.com
  links:
    - https://github.com/bunkanihongo

theme_mode: # [light | dark]

avatar:

toc: true

comments:
  provider: # [disqus | utterances | giscus]

paginate: 10

# ===== Kramdown =====
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# ===== Collections =====
collections:
  tabs:
    output: true
    sort_by: order

# ===== Defaults =====
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
